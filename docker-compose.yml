services:
  ai-service:
    build:
      context: ./Ai-Services
    container_name: sentinelai-ai
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ALLOWED_ORIGINS: ${AI_ALLOWED_ORIGINS:-http://localhost:5000}
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    container_name: sentinelai-backend
    depends_on:
      - ai-service
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/app
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: sentinelai-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
